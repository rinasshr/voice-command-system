version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/voice_commands.db:/app/voice_commands.db
      - vosk-model:/app/model
    environment:
      - VOSK_MODEL_PATH=/app/model

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  vosk-model:
